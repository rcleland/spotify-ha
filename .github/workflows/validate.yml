name: Validate

on:
  push:
  pull_request:

jobs:
  hacs-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Repo topics live only on GitHub (Settings → General); HACS cannot read them from git.
      # Add topics there for the default store, or remove `topics` from ignore once set.
      - uses: hacs/action@main
        with:
          category: integration
          ignore: topics

  # Lovelace card (HACS Frontend → Dashboard / plugin). Same repo, separate category from integration.
  hacs-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Plugin check includes screenshots in info.md for default-store PRs; optional for CI.
      - uses: hacs/action@main
        with:
          category: plugin
          ignore: topics images

  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: home-assistant/actions/hassfest@master
