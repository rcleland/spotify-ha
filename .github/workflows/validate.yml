name: Validate

on:
  push:
  pull_request:

jobs:
  hacs-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Repo topics live only on GitHub (Settings → General); HACS cannot read them from git.
      # Add topics there for the default store, or remove `topics` from ignore once set.
      - uses: hacs/action@main
        with:
          category: integration
          ignore: topics

  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: home-assistant/actions/hassfest@master
